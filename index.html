<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bot Store Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Admin Panel er Exact CSS variables */
    :root{--bg:#0b1220;--bg2:#0f1724;--border:#213041;--text:#e6eef6}
    [data-theme=light]{--bg:#f0f4f8;--bg2:#ffffff;--border:#d0dce8;--text:#1a2636}
    body{padding:0; margin:0; background:var(--bg); color:var(--text); transition:background .3s,color .3s; font-family: system-ui, -apple-system, sans-serif;}
    .card{background:var(--bg2); border:1px solid var(--border); border-radius: 8px;}
    table thead{background:#e9ecef;color:#0b1220}
    [data-theme=light] table thead{background:#1a2636;color:#f0f4f8}
    
    /* Sidebar Design (Copied from Admin Panel) */
    #sidebar{width:200px;min-height:100vh;background:#070d18;border-right:1px solid #213041;padding:.5rem 0;flex-shrink:0}
    #sidebar .nav-item{padding:.55rem 1rem;cursor:pointer;color:#8fa3b8;font-size:.88rem;border-left:3px solid transparent;transition:all .2s;-webkit-user-select:none;user-select:none}
    #sidebar .nav-item:hover{background:#0f1724;color:#e6eef6}
    #sidebar .nav-item.active{color:#fff;background:#0f1724;border-left-color:#0dcaf0}
    #sidebar .nav-brand{padding:.75rem 1rem 1rem;font-weight:700;font-size:.85rem;color:#0dcaf0;border-bottom:1px solid #213041;margin-bottom:.5rem}
    .page-wrapper{display:flex;min-height:100vh}
    #mainContent{flex:1;padding:1.5rem;min-width:0}
    @media(max-width:600px){ #sidebar { width:56px } #sidebar .nav-label { display:none } }
    
    /* Auth Form Full Screen Wrapper */
    #authSection { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1000; background: var(--bg); }
    .hidden { display: none !important; }
    .auth-card { width: 360px; }
  </style>
</head>
<body>

<div id="authSection">
    <div class="card p-4 shadow auth-card">
        <h4 class="text-center mb-4 text-info fw-bold">🛒 Bot Store</h4>
        <div id="authAlert" class="alert hidden small py-2"></div>
        
        <form id="loginForm">
            <div class="mb-3"><input type="email" id="logEmail" class="form-control bg-dark text-light border-secondary" placeholder="Email Address" required></div>
            <div class="mb-3"><input type="password" id="logPass" class="form-control bg-dark text-light border-secondary" placeholder="Password" required></div>
            <div><button type="submit" class="btn btn-info w-100 fw-bold">Login</button></div>
            <div class="text-center mt-3 small text-secondary">New here? <a href="#" id="showSignup" class="text-info text-decoration-none">Create account</a></div>
        </form>

        <form id="signupForm" class="hidden">
            <div class="mb-2"><input type="text" id="regName" class="form-control bg-dark text-light border-secondary" placeholder="Full Name" required></div>
            <div class="mb-2"><input type="email" id="regEmail" class="form-control bg-dark text-light border-secondary" placeholder="Email Address" required></div>
            <div class="mb-3"><input type="password" id="regPass" class="form-control bg-dark text-light border-secondary" placeholder="Password" required></div>
            <div><button type="submit" class="btn btn-success w-100 fw-bold">Sign Up</button></div>
            <div class="text-center mt-3 small text-secondary">Already have an account? <a href="#" id="showLogin" class="text-info text-decoration-none">Login</a></div>
        </form>
    </div>
</div>

<div class="page-wrapper hidden" id="dashboardSection">
    <nav id="sidebar">
        <div class="nav-brand">🛒 Storefront</div>
        <div class="nav-item active" onclick="showTab('store')" id="menu-store"><span>🤖</span> <span class="nav-label">Bot Store</span></div>
        <div class="nav-item" onclick="showTab('licenses')" id="menu-licenses"><span>🔑</span> <span class="nav-label">My Licenses</span></div>
    </nav>

    <div id="mainContent">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
                <div>
                    <h4 class="mb-0 fw-bold text-info">Customer Dashboard</h4>
                    <div class="small text-secondary mt-1">Logged in as: <span class="text-light fw-bold" id="userNameDisplay"></span></div>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-secondary me-2" id="darkModeToggle" title="Toggle Dark/Light Mode">☀️</button>
                    <button class="btn btn-sm btn-danger px-3 fw-bold" onclick="logout()">Logout</button>
                </div>
            </div>

            <div id="storeTab">
                <h6 class="mb-3 text-secondary">Available Bots for Purchase</h6>
                <div class="row g-3" id="botsContainer"></div>
            </div>

            <div id="licensesTab" class="hidden">
                <h6 class="mb-3 text-secondary">Your Active Subscriptions</h6>
                <div class="table-responsive card p-2">
                    <table class="table table-dark table-striped mb-0 text-center">
                        <thead class="table-light">
                            <tr>
                                <th>Bot ID / Username</th>
                                <th>Activation Key</th>
                                <th>Expiry Date</th>
                                <th>Machine ID</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="licensesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // TUMAR API URL EKHANE SET KORO
    const BASE_URL = "https://munnabd26.online"; 
    // ==========================================

    const authSec = document.getElementById('authSection');
    const dashSec = document.getElementById('dashboardSection');
    const authAlert = document.getElementById('authAlert');

    function showAlert(msg, type) {
        authAlert.className = `alert alert-${type} small py-2`;
        authAlert.textContent = msg;
        authAlert.classList.remove('hidden');
    }

    // Auth Form Toggle
    document.getElementById('showSignup').onclick = (e) => { e.preventDefault(); document.getElementById('loginForm').classList.add('hidden'); document.getElementById('signupForm').classList.remove('hidden'); authAlert.classList.add('hidden'); };
    document.getElementById('showLogin').onclick = (e) => { e.preventDefault(); document.getElementById('signupForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); authAlert.classList.add('hidden'); };

    // API Caller Setup
    async function apiRequest(endpoint, method='GET', data=null) {
        const token = localStorage.getItem('customerToken');
        const headers = { 'Content-Type': 'application/json' };
        if(token) headers['Authorization'] = `Bearer ${token}`;
        
        const options = { method, headers };
        if(data) options.body = JSON.stringify(data);
        
        try {
            const res = await fetch(`${BASE_URL}${endpoint}`, options);
            return await res.json();
        } catch (err) {
            return { status: "error", message: "API Connection Failed! Backend is offline." };
        }
    }

    // Login logic
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.textContent = 'Logging in...'; btn.disabled = true;
        const res = await apiRequest('/api/customer/auth', 'POST', { action: 'login', email: document.getElementById('logEmail').value, password: document.getElementById('logPass').value });
        btn.textContent = 'Login'; btn.disabled = false;
        
        if(res.status === 'ok') {
            localStorage.setItem('customerToken', res.token);
            localStorage.setItem('customerName', res.user.name);
            loadDashboard();
        } else {
            showAlert(res.message, 'danger');
        }
    };

    // Signup logic
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.textContent = 'Creating...'; btn.disabled = true;
        const res = await apiRequest('/api/customer/auth', 'POST', { action: 'register', name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPass').value });
        btn.textContent = 'Sign Up'; btn.disabled = false;
        
        if(res.status === 'ok') { 
            showAlert(res.message, 'success'); 
            document.getElementById('showLogin').click(); 
        } else { 
            showAlert(res.message, 'danger'); 
        }
    };

    // Sidebar Tab Manager
    function showTab(tab) {
        document.getElementById('storeTab').classList.toggle('hidden', tab !== 'store');
        document.getElementById('licensesTab').classList.toggle('hidden', tab !== 'licenses');
        document.getElementById('menu-store').classList.toggle('active', tab === 'store');
        document.getElementById('menu-licenses').classList.toggle('active', tab === 'licenses');
        if(tab === 'store') loadStore();
        if(tab === 'licenses') loadLicenses();
    }

    async function loadDashboard() {
        authSec.classList.add('hidden'); 
        dashSec.classList.remove('hidden');
        document.getElementById('userNameDisplay').textContent = localStorage.getItem('customerName');
        loadStore();
    }

    // Load Bot Store Cards
    async function loadStore() {
        const res = await apiRequest('/api/customer/bots', 'GET');
        if(res.status === 'error') return logout(); 
        
        const container = document.getElementById('botsContainer');
        container.innerHTML = res.data.map(b => `
            <div class="col-md-6 col-lg-4">
                <div class="card p-3 shadow-sm h-100" style="border-top: 3px solid #0dcaf0;">
                    <h5 class="fw-bold mb-1">🤖 ${b.app_name}</h5>
                    <div class="small text-secondary mb-3">Required Version: v${b.version}</div>
                    
                    <label class="small text-secondary mb-1">Select License Plan:</label>
                    <select id="plan_${b.app_name.replace(/[^a-zA-Z0-9]/g, '')}" class="form-select form-select-sm bg-dark text-light border-secondary mb-3">
                        <option value="1" data-price="${b.prices['1']}">1 Month (30 Days) - $${b.prices['1']}</option>
                        <option value="2" data-price="${b.prices['2']}">2 Months (60 Days) - $${b.prices['2']}</option>
                        <option value="3" data-price="${b.prices['3']}">3 Months (90 Days) - $${b.prices['3']}</option>
                    </select>
                    
                    <button class="btn btn-success btn-sm w-100 mt-auto fw-bold" onclick="buyBot('${b.app_name}', '${b.app_name.replace(/[^a-zA-Z0-9]/g, '')}')">💸 Pay Now</button>
                </div>
            </div>
        `).join('');
    }

    // Checkout & Auto Generation
    async function buyBot(appName, selectId) {
        const select = document.getElementById('plan_' + selectId);
        const plan = select.value;
        const price = select.options[select.selectedIndex].dataset.price;
        
        if(!confirm(`Confirm your dummy payment of $${price} for ${appName} (${plan} Month)?`)) return;
        
        const btn = document.activeElement;
        const oldText = btn.textContent;
        btn.textContent = 'Processing...'; btn.disabled = true;

        const res = await apiRequest('/api/customer/checkout', 'POST', { bot_name: appName, plan_months: plan });
        
        btn.textContent = oldText; btn.disabled = false;

        if(res.status === 'ok') {
            alert("✅ " + res.message);
            showTab('licenses'); // Auto redirect to My Licenses Tab
        } else {
            alert("❌ " + res.message);
        }
    }

    // Load Purchased Licenses
    async function loadLicenses() {
        const res = await apiRequest('/api/customer/my_licenses', 'GET');
        const tbody = document.getElementById('licensesTableBody');
        if(res.data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-secondary py-4">You haven't purchased any bots yet.</td></tr>`;
            return;
        }
        tbody.innerHTML = res.data.map(l => `
            <tr>
                <td class="fw-bold text-info">${l.username}</td>
                <td><code class="text-warning fs-6 bg-dark px-2 py-1 rounded" style="border: 1px dashed #6c757d;">${l.key}</code></td>
                <td>${l.expiry}</td>
                <td class="small text-secondary">${l.machine_id}</td>
                <td><span class="badge ${l.status === 'ENABLED' ? 'bg-success' : 'bg-danger'}">${l.status}</span></td>
            </tr>
        `).join('');
    }

    // Logout
    function logout() {
        localStorage.removeItem('customerToken');
        localStorage.removeItem('customerName');
        authSec.classList.remove('hidden'); 
        dashSec.classList.add('hidden');
    }

    // Dark/Light Mode Logic (Copied from Admin Panel)
    (function(){
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : '');
      const toggleEl = document.getElementById('darkModeToggle');
      if(toggleEl){
        toggleEl.textContent = saved === 'light' ? '🌙' : '☀️';
        toggleEl.addEventListener('click', ()=>{
          const isLight = document.documentElement.getAttribute('data-theme') === 'light';
          if(isLight){
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme','dark');
            toggleEl.textContent = '☀️';
          } else {
            document.documentElement.setAttribute('data-theme','light');
            localStorage.setItem('theme','light');
            toggleEl.textContent = '🌙';
          }
        });
      }
    })();
    
    // Auto Session Check
    if(localStorage.getItem('customerToken')) loadDashboard();
</script>
</body>
</html>
